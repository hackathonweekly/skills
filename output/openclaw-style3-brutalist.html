<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深圳OpenClaw🦞龙虾家长会｜第三期</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', 'Inter', 'PingFang SC', sans-serif;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.poster {
  width: 1080px;
  height: 1440px;
  background: #1a1a1a;
  position: relative;
  overflow: hidden;
}

/* Grid overlay */
.poster::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px);
  pointer-events: none;
  z-index: 1;
}

/* Neon accent bars */
.accent-bar-1 {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 12px;
  background: linear-gradient(90deg, #00ff88, #00ffff);
  z-index: 2;
}

.accent-bar-2 {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 60%;
  height: 8px;
  background: #ff0080;
  z-index: 2;
}

.content {
  position: relative;
  z-index: 3;
  padding: 60px 50px 50px 50px;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 40px;
}

.logo-brutalist {
  font-size: 28px;
  font-weight: 700;
  color: #00ff88;
  text-transform: uppercase;
  letter-spacing: 4px;
  line-height: 1.2;
  border: 3px solid #00ff88;
  padding: 12px 20px;
  display: inline-block;
  transform: skewX(-5deg);
}

.date-brutalist {
  background: #ff0080;
  color: white;
  padding: 20px 28px;
  font-size: 48px;
  font-weight: 900;
  line-height: 1;
  transform: rotate(3deg);
  box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
}

/* Title */
.title-section {
  margin-bottom: 35px;
  position: relative;
}

.episode-tag {
  display: inline-block;
  background: #00ffff;
  color: #000;
  padding: 8px 24px;
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 20px;
  transform: skewX(-8deg);
  letter-spacing: 2px;
}

.event-title {
  font-size: 76px;
  font-weight: 900;
  color: white;
  line-height: 0.9;
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: -4px;
  text-shadow: 4px 4px 0 rgba(255,0,128,0.5);
}

.subtitle-brutalist {
  font-size: 32px;
  font-weight: 700;
  color: #00ff88;
  line-height: 1.3;
  padding-left: 30px;
  border-left: 6px solid #00ff88;
}

/* Info Section */
.info-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 30px;
}

.info-brutalist {
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.2);
  padding: 24px;
  position: relative;
}

.info-brutalist::before {
  content: '';
  position: absolute;
  top: -6px;
  left: -6px;
  right: 6px;
  bottom: 6px;
  border: 2px solid #00ff88;
  pointer-events: none;
}

.info-label-brutalist {
  color: #00ffff;
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.info-text-brutalist {
  color: white;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.4;
}

/* Speakers */
.speakers-section {
  flex: 1;
}

.section-title-brutalist {
  font-size: 40px;
  font-weight: 900;
  color: white;
  text-transform: uppercase;
  margin-bottom: 24px;
  letter-spacing: 2px;
  position: relative;
  display: inline-block;
}

.section-title-brutalist::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, #00ff88, #00ffff);
}

.speakers-grid {
  display: grid;
  gap: 16px;
}

.speaker-brutalist {
  background: rgba(255,255,255,0.03);
  border-left: 6px solid #00ff88;
  padding: 16px 20px;
  position: relative;
  transition: all 0.3s;
}

.speaker-brutalist:nth-child(2) {
  border-left-color: #00ffff;
}

.speaker-brutalist:nth-child(3) {
  border-left-color: #ff0080;
}

.speaker-brutalist.highlight {
  background: rgba(255,0,128,0.15);
  border: 3px solid #ff0080;
  border-left-width: 6px;
  padding: 20px 24px;
}

.speaker-name-brutalist {
  color: white;
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.speaker-topic-brutalist {
  color: rgba(255,255,255,0.8);
  font-size: 20px;
  font-weight: 600;
  line-height: 1.4;
}

.highlight .speaker-name-brutalist {
  color: #ff0080;
  font-size: 32px;
}

/* Footer */
.footer {
  margin-top: 30px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-top: 24px;
  border-top: 3px solid rgba(255,255,255,0.1);
}

.organizer-brutalist {
  color: rgba(255,255,255,0.6);
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.organizer-name-brutalist {
  color: white;
  font-size: 36px;
  font-weight: 900;
  margin-top: 8px;
}

.qr-brutalist {
  width: 140px;
  height: 140px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 900;
  color: #000;
  text-align: center;
  transform: rotate(-3deg);
  box-shadow: 8px 8px 0 #00ff88;
}
</style>
</head>
<body>

<div class="poster">
  <div class="accent-bar-1"></div>
  <div class="accent-bar-2"></div>

  <div class="content">

    <div class="header">
      <div class="logo-brutalist">HACKATHON<br>WEEKLY</div>
      <div class="date-brutalist">03.15</div>
    </div>

    <div class="title-section">
      <div class="episode-tag">第三期</div>
      <h1 class="event-title">深圳<br>OPENCLAW🦞<br>龙虾家长会</h1>
      <div class="subtitle-brutalist">内容创作 / 企业破局 / 安全边界</div>
    </div>

    <div class="info-section">
      <div class="info-brutalist">
        <div class="info-label-brutalist">时间</div>
        <div class="info-text-brutalist">3月15日（周六）<br>19:00 - 21:30</div>
      </div>
      <div class="info-brutalist">
        <div class="info-label-brutalist">地点</div>
        <div class="info-text-brutalist">深圳后海<br>阿里中心 T3</div>
      </div>
    </div>

    <div class="speakers-section">
      <h2 class="section-title-brutalist">嘉宾阵容</h2>

      <div class="speakers-grid">
        <div class="speaker-brutalist">
          <div class="speaker-name-brutalist">Hayley</div>
          <div class="speaker-topic-brutalist">内容创作者/媒体人怎么用 OpenClaw</div>
        </div>

        <div class="speaker-brutalist">
          <div class="speaker-name-brutalist">Ego</div>
          <div class="speaker-topic-brutalist">传统企业/传统行业怎么用 OpenClaw 破局</div>
        </div>

        <div class="speaker-brutalist">
          <div class="speaker-name-brutalist">Kevin</div>
          <div class="speaker-topic-brutalist">OpenClaw 的应用价值与安全边界</div>
        </div>

        <div class="speaker-brutalist highlight">
          <div class="speaker-name-brutalist">🎯 圆桌对谈</div>
          <div class="speaker-topic-brutalist">安全性专题回应：OpenClaw 到底该怎么安全养？<br>主持：易小婧（香港商报《岁月婧好》工作室主理人）</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div>
        <div class="organizer-brutalist">主办方</div>
        <div class="organizer-name-brutalist">周周黑客松深圳</div>
      </div>
      <div class="qr-brutalist">
        扫码<br>报名
      </div>
    </div>

  </div>
</div>

</body>
</html>
